services:
  db:
    image: postgres:16-alpine
    container_name: marimo-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "marimo"
      POSTGRES_USER: "marimo"
      POSTGRES_PASSWORD: "marimo"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marimo -d marimo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-server:
    build:
      context: .
      args:
        SERVICE_DIR: api_server
        REQUIREMENTS_FILE: requirements-api.txt
    container_name: marimo-api-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://marimo:marimo@db:5432/marimo"
      LLM_SERVER_URL: "http://llm-server:8000"

volumes:
  db-data:
